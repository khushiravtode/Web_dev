<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <form>
        <h2>Job Application</h2>
        <label for="name"> Name </label>
        <input type="text" id="name" name="name">
        
        <br>
        <br>

        <label for="email">Email </label>
        <input type="email" id="email" name="email">
    
        <br><br>
        <label for="phone">Phone No.</label>
        <input type="tel" id="phone" name="phone">
    
        <br><br>

        <label for="resume">Resume</label>
        <input type="file" id="resume" name="resume">
    
        <br><br>
        <label for="experience">experience</label>
        <input type="number" id="experience" name="experience" min="0" max="50">
        <br><br>

        <fieldset>
            <legend>Skills</legend>
            <br>
            <label for="html">HTML</label>
            <input type="checkbox" id="html" name="html">

            <br>
            <label for="css">CSS</label>
            <input type="checkbox" id="css" name="css">

            <br>
            <label for="java">Java</label>
            <input type="checkbox" id="java" name="java">

        </fieldset>
        <br>
        <label for="qualification">highest qualification</label>
        <select name="qualification" id="qualification">
            <option value="high school">High School</option>
            <option value="Graduate">Graduate</option>
            <option value="undergraguate"> Under Graduate</option>
            <option value="Masters">Masters</option> <option value=""></option>
        </select> 
        <br>
        
     
        <fieldset>
        <legend>avaibility</legend>
        <label for="full">Full Time</label>
        <input type="radio" name="avaibility" id="avaibility" value="full">

        <br>
        <label for="part">Part Time</label>
         <input type="radio" name="avaibility" id="avaibility" value="part">
        
        </fieldset>


        <br>
        <label for="coment">Adittional Coment</label>
        <br>
        <textarea name="coment" id="coment"></textarea>
         
    

        <br>
        <input type="submit" value="Submit Aplication">
    
    </form>
 
</body>
</html>
