<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <legend>Personal information</legend>
        <label for="name"> Name </label>
        <input type="text" id="name" name="name">


        <label for="email">Email </label>
        <input type="email" id="email" name="email">


        <label for="phone">Phone No.</label>
        <input type="tel" id="phone" name="phone">


        <label for="dateofbirth">Date of birth</label>
        <input type="date" id="dateofbirth" name="dateofbirth">

        <span>
            Gender:
        </span>

        <label for="radio1">Male</label>
        <input type="radio" name="gender" id="radio1">

        <label for="radio2">Female</label>
        <input type="radio" name="gender" id="radio2">

        <label for="country">Contry</label>
        <select>
            <option value="a">a</option>
            <option value="b">b</option>
            <option value="c">c</option>
            <option value="d">d</option>
            <option value="e">e</option>
        </select>
    </fieldset>

    <fieldset>
        <legend> Address</legend>

        <label for="street">Street</label>
        <input type="text" id="street" name="street">

        <label for="city">City</label>
        <input type="text" id="city" name="city">

        <label for="state">State</label>
        <input type="text" id="state" name="state">

        <label for="zipcode">Zipcode</label>
        <input type="zipcode" id="zipcode" name="zipcode">


    </fieldset>

    <fieldset>

        <legend>Other information</legend>
        <label for="comment">Comment</label>
        <textarea name="comment" id="commment"></textarea>

        <label for="">I agree to the terms of service</label>
        <input type="checkbox" id="" value=""> 
        <br/>
        <br/>
        <input type="submit" value="submit">
    </fieldset>

</body>
</html>
